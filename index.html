<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 Казино</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
    }

    #screen-home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .welcome-text { font-size: 1.4rem; opacity: 0.8; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
    .welcome-sub { font-size: 0.9rem; opacity: 0.5; margin-bottom: 15px; letter-spacing: 2px; }
    .home-gif { width: 280px; margin-bottom: 30px; border-radius: 16px; }
    .balance-home {
      font-size: 1.1rem;
      background: rgba(255,255,255,0.1);
      padding: 8px 24px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .balance-home.negative { color: #ff4444; border-color: rgba(255,68,68,0.3); }
    .games-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
    .game-btn {
      display: flex; align-items: center; gap: 15px;
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1));
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 16px; padding: 16px 20px;
      cursor: pointer; color: white; font-size: 1rem; font-weight: bold;
      transition: transform 0.1s, background 0.2s; text-align: left;
    }
    .game-btn:active { transform: scale(0.97); }
    .game-btn:hover { background: linear-gradient(145deg, rgba(255,215,0,0.1), rgba(255,215,0,0.15)); }
    .game-btn.disabled { opacity: 0.4; cursor: not-allowed; border-color: rgba(255,255,255,0.1); }
    .game-btn .icon { font-size: 2rem; }
    .game-btn .info { display: flex; flex-direction: column; }
    .game-btn .name { font-size: 1rem; font-weight: bold; }
    .game-btn .desc { font-size: 0.75rem; opacity: 0.6; margin-top: 2px; }

    #screen-slots, #screen-rocket { display: none; width: 100%; }
    .back-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 8px 16px; border-radius: 20px;
      cursor: pointer; font-size: 0.9rem; margin-bottom: 20px;
    }

    #screen-slots { flex-direction: column; align-items: center; }
    .gif-title { width: 300px; margin-bottom: 10px; }
    .balance {
      font-size: 1.2rem; background: rgba(255,255,255,0.1);
      padding: 8px 24px; border-radius: 20px; margin-bottom: 30px;
    }
    .balance.negative { color: #ff4444; }
    .machine {
      background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
      border: 3px solid gold; border-radius: 20px; padding: 30px;
      box-shadow: 0 0 40px rgba(255,215,0,0.3);
      text-align: center; width: 100%; max-width: 350px;
    }
    .slots { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .slot {
      width: 80px; height: 80px; background: white; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
    }
    .slot.spinning { animation: spin 0.1s infinite; }
    @keyframes spin { 0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.1)} }
    .bet-control { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center; }
    .bet-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: gold; color: black; font-size: 1.2rem; cursor: pointer; font-weight: bold;
    }
    .bet-input {
      width: 90px; text-align: center; font-size: 1rem; padding: 6px;
      border-radius: 10px; border: 2px solid gold;
      background: rgba(255,255,255,0.1); color: white; outline: none;
    }
    .bet-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .buttons-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
    .allin-btn {
      background: linear-gradient(145deg, #ff4444, #cc0000);
      color: white; border: none; padding: 8px 16px; font-size: 0.95rem;
      font-weight: bold; border-radius: 50px; cursor: pointer;
    }
    .fast-btn {
      background: linear-gradient(145deg, #444, #222);
      color: white; border: 2px solid #888; padding: 8px 16px;
      font-size: 0.95rem; font-weight: bold; border-radius: 50px; cursor: pointer;
    }
    .fast-btn.active { background: linear-gradient(145deg, #00aa44, #007733); border-color: #00ff66; }
    .spin-btn {
      background: linear-gradient(145deg, #ffd700, #ff8c00);
      color: black; border: none; padding: 15px 50px; font-size: 1.3rem;
      font-weight: bold; border-radius: 50px; cursor: pointer;
      box-shadow: 0 5px 15px rgba(255,140,0,0.5); transition: transform 0.1s; width: 100%;
    }
    .spin-btn:active { transform: scale(0.95); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 20px; font-size: 1.1rem; min-height: 30px; color: gold; font-weight: bold; }
    .paytable { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; line-height: 1.8; }

    #screen-rocket { flex-direction: column; align-items: center; }
    .rocket-header {
      font-size: 1.4rem; font-weight: bold; margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0,170,255,0.8); letter-spacing: 2px;
    }
    .rocket-balance {
      font-size: 1rem; background: rgba(255,255,255,0.08);
      padding: 6px 20px; border-radius: 20px; margin-bottom: 15px;
      border: 1px solid rgba(0,170,255,0.3);
    }
    .rocket-balance.negative { color: #ff4444; }
    .rocket-box {
      background: linear-gradient(145deg, #0d1b2a, #1a2a3a);
      border: 2px solid rgba(0,170,255,0.4);
      border-radius: 24px; padding: 20px;
      box-shadow: 0 0 40px rgba(0,100,255,0.2), inset 0 0 30px rgba(0,0,0,0.3);
      text-align: center; width: 100%; max-width: 350px;
    }
    .rocket-canvas-wrap {
      width: 100%; height: 220px;
      background: linear-gradient(180deg, #000008, #00001a, #000033);
      border-radius: 16px; margin-bottom: 15px;
      position: relative; overflow: hidden;
      border: 1px solid rgba(0,100,255,0.2);
    }
    #rocketCvs { width: 100%; height: 100%; display: block; }
    .rocket-multiplier {
      font-size: 3.5rem; font-weight: bold;
      color: #00ff88; text-shadow: 0 0 30px #00ff88, 0 0 60px rgba(0,255,136,0.3);
      margin-bottom: 4px; transition: color 0.3s;
    }
    .rocket-multiplier.crashed { color: #ff4444; text-shadow: 0 0 30px #ff4444, 0 0 60px rgba(255,68,68,0.3); }
    .rocket-status { font-size: 0.85rem; opacity: 0.6; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
    .rocket-controls {
      background: rgba(255,255,255,0.04);
      border-radius: 16px; padding: 15px; margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .rocket-controls-label { font-size: 0.75rem; opacity: 0.5; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .rocket-bet-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
    .rocket-btn {
      background: linear-gradient(145deg, #0055cc, #003399);
      color: white; border: none; padding: 15px 30px; font-size: 1.1rem;
      font-weight: bold; border-radius: 16px; cursor: pointer; width: 100%;
      box-shadow: 0 4px 20px rgba(0,85,204,0.4); transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
    }
    .rocket-btn:active { transform: scale(0.97); }
    .rocket-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .rocket-btn.cashout {
      background: linear-gradient(145deg, #00cc44, #008822);
      box-shadow: 0 4px 20px rgba(0,200,68,0.5);
      animation: pulse-green 0.8s infinite alternate;
    }
    @keyframes pulse-green {
      from { box-shadow: 0 4px 20px rgba(0,200,68,0.5); }
      to { box-shadow: 0 4px 35px rgba(0,255,100,0.8); }
    }
    .rocket-result { margin-top: 12px; font-size: 1rem; min-height: 25px; font-weight: bold; color: #00ff88; }
    .rocket-history { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
    .history-chip {
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
    }
    .history-chip.win { background: rgba(0,200,68,0.2); color: #00ff88; border: 1px solid rgba(0,200,68,0.3); }
    .history-chip.lose { background: rgba(255,68,68,0.2); color: #ff6666; border: 1px solid rgba(255,68,68,0.3); }

    #broke-screen {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 999;
      flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 20px;
    }

    #banner-popup {
      display: none; position: fixed; bottom: 20px;
      left: 50%; transform: translateX(-50%);
      z-index: 888; max-width: 300px; width: 90%;
      animation: fadeIn 0.4s ease;
    }
  </style>
</head>
<body>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="screen-home">
    <div class="welcome-text">Добро пожаловать в</div>
    <img src="casino1.gif" class="home-gif">
    <div class="balance-home" id="balance-home">💰 <span id="balance-home-val">1000</span> монет</div>
    <div class="games-grid">
      <button class="game-btn" onclick="showScreen('slots')">
        <span class="icon">🎰</span>
        <div class="info">
          <span class="name">Слоты</span>
          <span class="desc">Крути и выигрывай!</span>
        </div>
      </button>
      <button class="game-btn" onclick="showScreen('rocket')">
        <span class="icon">🚀</span>
        <div class="info">
          <span class="name">Ракетка Илона Маска</span>
          <span class="desc">Лети как можно выше!</span>
        </div>
      </button>
      <button class="game-btn disabled">
        <span class="icon">🔒</span>
        <div class="info">
          <span class="name">В разработке</span>
          <span class="desc">Скоро...</span>
        </div>
      </button>
    </div>
  </div>

  <!-- ЭКРАН СЛОТОВ -->
  <div id="screen-slots">
    <button class="back-btn" onclick="showScreen('home')">← Назад</button>
    <img src="casino1.gif" class="gif-title">
    <div class="balance" id="balanceBox">💰 Баланс: <span id="balance">1000</span> монет</div>
    <div class="machine">
      <div class="slots">
        <div class="slot" id="s1">🍒</div>
        <div class="slot" id="s2">🍋</div>
        <div class="slot" id="s3">🍊</div>
      </div>
      <div class="bet-control">
        <button class="bet-btn" onclick="changeBet(-10)">−</button>
        <input class="bet-input" type="number" id="bet-input" value="10" min="1" onchange="betFromInput()">
        <button class="bet-btn" onclick="changeBet(10)">+</button>
      </div>
      <div class="buttons-row">
        <button class="allin-btn" onclick="allIn()">💸 ALL IN</button>
        <button class="fast-btn" id="fastBtn" onclick="toggleFast()">⚡ Быстро: ВЫКЛ</button>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spinSlots()">🎰 КРУТИТЬ!</button>
      <div class="result" id="result"></div>
      <div class="paytable">
        💎💎💎 Джекпот = x100 | ⭐⭐⭐ = x50<br>
        Три одинаковых = x20 | Два одинаковых = x5
      </div>
    </div>
  </div>

  <!-- ЭКРАН РАКЕТЫ -->
  <div id="screen-rocket">
    <button class="back-btn" onclick="showScreen('home')">← Назад</button>
    <div class="rocket-header">🚀 РАКЕТКА ИЛОНА</div>
    <div class="rocket-balance" id="balanceBoxRocket">💰 <span id="balanceRocket">1000</span> монет</div>
    <div class="rocket-box">
      <div class="rocket-canvas-wrap">
        <canvas id="rocketCvs"></canvas>
      </div>
      <div class="rocket-multiplier" id="rocketMultiplier">x1.00</div>
      <div class="rocket-status" id="rocketStatus">Сделай ставку и запускай</div>
      <div class="rocket-controls">
        <div class="rocket-controls-label">Ставка</div>
        <div class="rocket-bet-row">
          <button class="bet-btn" onclick="changeRocketBet(-10)">−</button>
          <input class="bet-input" type="number" id="rocket-bet-input" value="10" min="1">
          <button class="bet-btn" onclick="changeRocketBet(10)">+</button>
        </div>
        <button class="allin-btn" style="margin-top:10px;width:100%;" onclick="rocketAllIn()">💸 ALL IN</button>
      </div>
      <button class="rocket-btn" id="rocketBtn" onclick="rocketAction()">🚀 ЗАПУСТИТЬ!</button>
      <div class="rocket-result" id="rocketResult"></div>
      <div class="rocket-history" id="rocketHistory"></div>
    </div>
  </div>

  <!-- BROKE SCREEN -->
  <div id="broke-screen">
    <p style="color:white;font-size:2rem;font-weight:bold;">ты броук 😢</p>
    <p id="debt-text" style="color:#ff4444;font-size:1.2rem;margin-top:10px;"></p>
    <button onclick="hideBroke()" style="margin-top:20px;padding:12px 30px;font-size:1rem;font-weight:bold;border-radius:50px;border:none;background:gold;color:black;cursor:pointer;">😤 Понял, продолжить с долгом</button>
  </div>

  <!-- БАННЕР POPUP -->
  <div id="banner-popup">
    <div style="position:relative;">
      <img id="banner-img" src="" style="width:100%;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.5);">
      <button onclick="closeBanner()" style="position:absolute;top:-10px;right:-10px;width:28px;height:28px;border-radius:50%;border:none;background:#ff4444;color:white;font-size:1rem;cursor:pointer;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,0.4);">✕</button>
    </div>
  </div>

  <audio id="soundBg" src="jazz.mp3" loop></audio>
  <audio id="soundWin" src="pole_letter_correct.mp3"></audio>
  <audio id="soundLose" src="pole_letter_wrong.mp3"></audio>
  <audio id="soundSpin" src="pole-chudes-baraban.mp3"></audio>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const emojis = ['🍒','🍋','🍊','🍇','⭐','💎'];
    let balance = parseInt(localStorage.getItem('balance') || '1000');

    const soundBg = document.getElementById('soundBg');
    const soundWin = document.getElementById('soundWin');
    const soundLose = document.getElementById('soundLose');
    const soundSpin = document.getElementById('soundSpin');

    soundBg.volume = 0;
    soundWin.volume = 0.1;
    soundLose.volume = 0.1;
    soundSpin.volume = 0.1;

    document.addEventListener('click', () => {
      if (soundBg.paused) { soundBg.play().catch(() => {}); fadeBg(0, 0.1); }
    }, { once: true });

    let bgFadeTimer = null;

    function fadeBg(from, to, duration = 500) {
      if (bgFadeTimer) clearInterval(bgFadeTimer);
      const steps = 20;
      const step = (to - from) / steps;
      const intervalTime = duration / steps;
      let current = from;
      soundBg.volume = Math.max(0, Math.min(0.1, from));
      bgFadeTimer = setInterval(() => {
        current += step;
        soundBg.volume = Math.max(0, Math.min(0.1, current));
        if ((step > 0 && current >= to) || (step < 0 && current <= to)) {
          clearInterval(bgFadeTimer);
          soundBg.volume = Math.max(0, Math.min(0.1, to));
        }
      }, intervalTime);
    }

    function playSound(sound) {
      fadeBg(soundBg.volume, 0, 300);
      sound.currentTime = 0;
      sound.play().catch(() => {});
      sound.onended = () => fadeBg(0, 0.1, 600);
    }

    function updateBalance() {
      localStorage.setItem('balance', balance);
      const fmt = balance.toLocaleString('de-DE');
      document.getElementById('balance').textContent = fmt;
      document.getElementById('balanceRocket').textContent = fmt;
      document.getElementById('balance-home-val').textContent = fmt;
      const neg = balance < 0;
      document.getElementById('balance-home').classList.toggle('negative', neg);
      document.getElementById('balanceBox').classList.toggle('negative', neg);
      document.getElementById('balanceBoxRocket').classList.toggle('negative', neg);
    }

    function checkBroke() {
      if (balance < 0 && document.getElementById('broke-screen').style.display !== 'flex') {
        const debt = Math.abs(balance);
        setTimeout(() => {
          document.getElementById('debt-text').textContent = 'Твой долг: ' + debt.toLocaleString('de-DE') + ' монет 💀';
          document.getElementById('broke-screen').style.display = 'flex';
          try { tg.sendData(JSON.stringify({ type: 'debt', amount: debt })); } catch(e) {}
        }, 300);
      }
    }

    function hideBroke() {
      document.getElementById('broke-screen').style.display = 'none';
    }

    function showScreen(name) {
      document.getElementById('screen-home').style.display = 'none';
      document.getElementById('screen-slots').style.display = 'none';
      document.getElementById('screen-rocket').style.display = 'none';
      closeBanner();
      if (name === 'home') document.getElementById('screen-home').style.display = 'flex';
      else if (name === 'slots') document.getElementById('screen-slots').style.display = 'flex';
      else if (name === 'rocket') {
        document.getElementById('screen-rocket').style.display = 'flex';
        setTimeout(initRocketCanvas, 50);
      }
    }

    // ===== БАННЕРЫ =====
    const banners = ['image1.png', 'image2.png'];
    let bannerIndex = 0;

    function showBanner() {
      if (document.getElementById('screen-slots').style.display !== 'flex') return;
      const popup = document.getElementById('banner-popup');
      const img = document.getElementById('banner-img');
      img.src = banners[bannerIndex % banners.length];
      bannerIndex++;
      popup.style.display = 'block';
    }

    function closeBanner() {
      document.getElementById('banner-popup').style.display = 'none';
    }

    setInterval(showBanner, 10000);

    // ===== СЛОТЫ =====
    let bet = 10;
    let spinning = false;
    let fastMode = false;

    function changeBet(amount) {
      bet = Math.max(1, bet + amount);
      document.getElementById('bet-input').value = bet;
    }

    function betFromInput() {
      const val = parseInt(document.getElementById('bet-input').value);
      if (!isNaN(val) && val >= 1) { bet = val; document.getElementById('bet-input').value = bet; }
    }

    function allIn() {
      if (spinning) return;
      bet = Math.max(1, Math.abs(balance));
      document.getElementById('bet-input').value = bet;
    }

    function toggleFast() {
      fastMode = !fastMode;
      const btn = document.getElementById('fastBtn');
      btn.textContent = fastMode ? '⚡ Быстро: ВКЛ' : '⚡ Быстро: ВЫКЛ';
      btn.classList.toggle('active', fastMode);
    }

    function randomEmoji() { return emojis[Math.floor(Math.random() * emojis.length)]; }

    function showResult(result) {
      ['s1','s2','s3'].forEach((id, i) => document.getElementById(id).textContent = result[i]);
      let win = 0, msg = '';
      const [a, b, c] = result;
      if (a === b && b === c) {
        if (a === '💎') { win = bet * 100; msg = '🏆 ДЖЕКПОТ! x100!'; }
        else if (a === '⭐') { win = bet * 50; msg = '🌟 СУПЕР! x50!'; }
        else { win = bet * 20; msg = '🎉 ПОБЕДА! x20!'; }
      } else if (a === b || b === c || a === c) {
        win = bet * 5; msg = '👍 Два одинаковых! x5!';
      } else { msg = '😔 Не повезло...'; }

      if (win > 0) { balance += win; updateBalance(); playSound(soundWin); }
      else { playSound(soundLose); }

      document.getElementById('result').textContent = msg;
      document.getElementById('spinBtn').disabled = false;
      spinning = false;
      checkBroke();
    }

    function spinSlots() {
      if (spinning) return;
      spinning = true;
      balance -= bet;
      updateBalance();
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('result').textContent = '';
      const finalResult = [randomEmoji(), randomEmoji(), randomEmoji()];

      if (fastMode) { showResult(finalResult); return; }

      playSound(soundSpin);
      ['s1','s2','s3'].forEach(id => document.getElementById(id).classList.add('spinning'));
      let ticks = 0;
      const interval = setInterval(() => {
        ['s1','s2','s3'].forEach(id => document.getElementById(id).textContent = randomEmoji());
        ticks++;
        if (ticks > 15) {
          clearInterval(interval);
          soundSpin.pause(); soundSpin.currentTime = 0;
          soundSpin.onended = null;
          fadeBg(0, 0.1, 600);
          ['s1','s2','s3'].forEach(id => document.getElementById(id).classList.remove('spinning'));
          showResult(finalResult);
        }
      }, 80);
    }

    // ===== РАКЕТА =====
    let rocketBet = 10;
    let rocketRunning = false;
    let rocketCashed = false;
    let rocketMultiplier = 1.0;
    let rocketInterval = null;
    let rocketCrashAt = 1.0;
    let rocketStars = [];
    let rocketHistory = [];

    function changeRocketBet(amount) {
      rocketBet = Math.max(1, rocketBet + amount);
      document.getElementById('rocket-bet-input').value = rocketBet;
    }

    function rocketAllIn() {
      if (rocketRunning) return;
      rocketBet = Math.max(1, Math.abs(balance));
      document.getElementById('rocket-bet-input').value = rocketBet;
    }

    function initRocketCanvas() {
      const cvs = document.getElementById('rocketCvs');
      const wrap = cvs.parentElement;
      cvs.width = wrap.offsetWidth;
      cvs.height = wrap.offsetHeight;
      rocketStars = Array.from({length: 60}, () => ({
        x: Math.random() * cvs.width,
        y: Math.random() * cvs.height,
        r: Math.random() * 1.5 + 0.3,
        opacity: Math.random() * 0.8 + 0.2,
        twinkle: Math.random()
      }));
      drawRocketIdle();
    }

    function drawStars(ctx, cvs, moving) {
      rocketStars.forEach(s => {
        if (moving) { s.y += 2; if (s.y > cvs.height) s.y = 0; }
        s.twinkle += 0.05;
        const op = s.opacity * (0.6 + 0.4 * Math.sin(s.twinkle));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${op})`;
        ctx.fill();
      });
    }

    function drawRocketIdle() {
      const cvs = document.getElementById('rocketCvs');
      if (!cvs.width) return;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      drawStars(ctx, cvs, false);
      ctx.font = '44px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🚀', cvs.width / 2, cvs.height / 2);
    }

    function drawRocketFlying(progress) {
      const cvs = document.getElementById('rocketCvs');
      if (!cvs.width) return;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      drawStars(ctx, cvs, true);
      const rocketY = cvs.height * 0.75 - (cvs.height * 0.55 * Math.min(progress, 1));
      const grad = ctx.createLinearGradient(0, rocketY + 22, 0, rocketY + 65);
      grad.addColorStop(0, 'rgba(255,200,50,0.9)');
      grad.addColorStop(0.4, 'rgba(255,100,0,0.7)');
      grad.addColorStop(1, 'rgba(255,30,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(cvs.width / 2, rocketY + 40, 7 + Math.random() * 3, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = '44px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🚀', cvs.width / 2, rocketY);
    }

    function drawRocketCrash() {
      const cvs = document.getElementById('rocketCvs');
      if (!cvs.width) return;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      drawStars(ctx, cvs, false);
      const grad = ctx.createRadialGradient(cvs.width/2, cvs.height/2, 0, cvs.width/2, cvs.height/2, 80);
      grad.addColorStop(0, 'rgba(255,150,0,0.4)');
      grad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, cvs.width, cvs.height);
      ctx.font = '50px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💥', cvs.width / 2, cvs.height / 2);
    }

    function generateCrashPoint() {
      const r = Math.random();
      if (r < 0.35) return 1.0 + Math.random() * 0.4;
      if (r < 0.65) return 1.4 + Math.random() * 1.6;
      if (r < 0.88) return 3 + Math.random() * 7;
      return 10 + Math.random() * 90;
    }

    function addToHistory(multiplier, won) {
      rocketHistory.unshift({ multiplier, won });
      if (rocketHistory.length > 6) rocketHistory.pop();
      const el = document.getElementById('rocketHistory');
      el.innerHTML = rocketHistory.map(h =>
        `<span class="history-chip ${h.won ? 'win' : 'lose'}">x${h.multiplier.toFixed(2)}</span>`
      ).join('');
    }

    function rocketAction() {
      if (!rocketRunning) {
        rocketBet = parseInt(document.getElementById('rocket-bet-input').value) || 10;
        if (rocketBet < 1) return;
        balance -= rocketBet;
        updateBalance();

        rocketRunning = true;
        rocketCashed = false;
        rocketMultiplier = 1.0;
        rocketCrashAt = generateCrashPoint();

        document.getElementById('rocketBtn').textContent = '💰 ЗАБРАТЬ!';
        document.getElementById('rocketBtn').classList.add('cashout');
        document.getElementById('rocketResult').textContent = '';
        document.getElementById('rocketStatus').textContent = 'Ракета летит! Успей забрать!';
        document.getElementById('rocketMultiplier').classList.remove('crashed');

        let progress = 0;
        rocketInterval = setInterval(() => {
          rocketMultiplier += 0.03 + rocketMultiplier * 0.008;
          progress += 0.04;
          document.getElementById('rocketMultiplier').textContent = 'x' + rocketMultiplier.toFixed(2);
          drawRocketFlying(progress);

          if (rocketMultiplier >= rocketCrashAt) {
            clearInterval(rocketInterval);
            rocketRunning = false;
            drawRocketCrash();
            document.getElementById('rocketMultiplier').textContent = '💥 x' + rocketCrashAt.toFixed(2);
            document.getElementById('rocketMultiplier').classList.add('crashed');
            document.getElementById('rocketStatus').textContent = 'Ракета разбилась!';
            document.getElementById('rocketBtn').textContent = '🚀 ЗАПУСТИТЬ!';
            document.getElementById('rocketBtn').classList.remove('cashout');
            if (!rocketCashed) {
              document.getElementById('rocketResult').textContent = '😔 Не успел! Ставка сгорела.';
              playSound(soundLose);
              addToHistory(rocketCrashAt, false);
            }
            checkBroke();
          }
        }, 100);
      } else {
        clearInterval(rocketInterval);
        rocketRunning = false;
        rocketCashed = true;
        const win = Math.floor(rocketBet * rocketMultiplier);
        balance += win;
        updateBalance();
        playSound(soundWin);
        document.getElementById('rocketResult').textContent = '🎉 Забрал x' + rocketMultiplier.toFixed(2) + '! +' + win.toLocaleString('de-DE') + ' монет!';
        document.getElementById('rocketStatus').textContent = 'Отлично! Сыграй ещё!';
        document.getElementById('rocketBtn').textContent = '🚀 ЗАПУСТИТЬ!';
        document.getElementById('rocketBtn').classList.remove('cashout');
        document.getElementById('rocketMultiplier').classList.remove('crashed');
        addToHistory(rocketMultiplier, true);
        drawRocketIdle();
      }
    }

    updateBalance();
    showScreen('home');
  </script>
</body>
</html>
